name: C++ CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  debug_unix:
    name: Debug ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-24.04
          - label: linux-arm64
            runner: ubuntu-24.04-arm
          - label: macos-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Install dependencies
        shell: bash
        run: |
          set -e
          conda create -y -q -p "$HOME/local" \
            c-compiler cxx-compiler cmake ninja \
            python=3.13 pybind11 \
            boost-cpp tbb tbb-devel eigen nlopt ipopt pagmo-devel
      - name: Configure
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$HOME/local" \
            -DCMAKE_INSTALL_PREFIX="$HOME/local" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DPYGMO_ENABLE_IPO=ON
      - name: Build
        shell: bash
        run: |
          set -e
          conda run -p "$HOME/local" cmake --build build --parallel

  release_windows_x64:
    name: Release windows-x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
      - name: Configure
        shell: powershell
        run: |
          conda create -y -q -p $env:USERPROFILE\local cmake ninja python=3.13 pybind11 boost-cpp tbb tbb-devel eigen nlopt ipopt pagmo-devel
          conda run -p $env:USERPROFILE\local cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH=$env:USERPROFILE\local `
            -DCMAKE_INSTALL_PREFIX=$env:USERPROFILE\local `
            -DBoost_NO_BOOST_CMAKE=ON `
            -DPYGMO_ENABLE_IPO=ON
      - name: Build
        shell: powershell
        run: conda run -p $env:USERPROFILE\local cmake --build build --config Release --parallel